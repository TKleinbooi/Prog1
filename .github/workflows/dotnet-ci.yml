name: .NET CI Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore Prog_Poe_Part1/Prog_Poe_Part1.csproj

      - name: Build project
        run: dotnet build Prog_Poe_Part1/Prog_Poe_Part1.csproj --no-restore --configuration Release
